name: Build EWMS docs (cron or manual trigger)

permissions:
  contents: read

concurrency:
  group: ewms-docs-pages
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      wms_ref:
        description: 'Optional WMS ref (tag, branch, or SHA)'
        required: false
        default: ''
        type: string
      mqs_ref:
        description: 'Optional MQS ref (tag, branch, or SHA)'
        required: false
        default: ''
        type: string
      tms_ref:
        description: 'Optional TMS ref (tag, branch, or SHA)'
        required: false
        default: ''
        type: string
      mqclient_ref:
        description: 'Optional MQClient ref (tag, branch, or SHA)'
        required: false
        default: ''
        type: string
      pilot_ref:
        description: 'Optional Pilot ref (tag, branch, or SHA)'
        required: false
        default: ''
        type: string

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout here (main)
        uses: actions/checkout@v6
        with:
          ref: "main"  # always build docs from main branch — so we can easily rerun the build if needed

      - name: Initialize "ref" banner include files — needed even if empty for build to succeed
        run: |
          set -euo pipefail
          mkdir -p docs/_generated
          echo -n > docs/_generated/wms-ref-banner.rst
          echo -n > docs/_generated/mqs-ref-banner.rst
          echo -n > docs/_generated/tms-ref-banner.rst
          echo -n > docs/_generated/mqclient-ref-banner.rst
          echo -n > docs/_generated/pilot-ref-banner.rst

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Checkout WMS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-workflow-management-service
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.wms_ref || '' }}
          path: sources/wms
      - name: Write WMS "ref" banner
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.wms_ref != '' }}
        run: |
          set -euo pipefail
          scripts/write-ref-banner.sh \
              WMS \
              "${{ inputs.wms_ref }}" \
              docs/_generated/wms-ref-banner.rst

      - name: Checkout MQS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-message-queue-service
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.mqs_ref || '' }}
          path: sources/mqs
      - name: Write MQS "ref" banner
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mqs_ref != '' }}
        run: |
          set -euo pipefail
          scripts/write-ref-banner.sh \
              MQS \
              "${{ inputs.mqs_ref }}" \
              docs/_generated/mqs-ref-banner.rst

      - name: Checkout TMS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-task-management-service
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tms_ref || '' }}
          path: sources/tms
      - name: Write TMS "ref" banner
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tms_ref != '' }}
        run: |
          set -euo pipefail
          scripts/write-ref-banner.sh \
              TMS \
              "${{ inputs.tms_ref }}" \
              docs/_generated/tms-ref-banner.rst

      - name: Checkout MQClient
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/MQClient
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.mqclient_ref || '' }}
          path: sources/mqclient
      - name: Write MQClient "ref" banner
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mqclient_ref != '' }}
        run: |
          set -euo pipefail
          scripts/write-ref-banner.sh \
              MQClient \
              "${{ inputs.mqclient_ref }}" \
              docs/_generated/mqclient-ref-banner.rst

      - name: Checkout Pilot
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-pilot
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.pilot_ref || '' }}
          path: sources/pilot
      - name: Write Pilot "ref" banner
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.pilot_ref != '' }}
        run: |
          set -euo pipefail
          scripts/write-ref-banner.sh \
              Pilot \
              "${{ inputs.pilot_ref }}" \
              docs/_generated/pilot-ref-banner.rst

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          set -euo pipefail
          python -m pip install -r docs/requirements.txt

      - name: Show selected refs
        env:
          WMS_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.wms_ref || '' }}
          MQS_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.mqs_ref || '' }}
          TMS_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tms_ref || '' }}
          MQCLIENT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.mqclient_ref || '' }}
          PILOT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.pilot_ref || '' }}
        run: |
          set -euo pipefail
          echo "WMS ref:      ${WMS_REF:-<default branch>}"
          echo "MQS ref:      ${MQS_REF:-<default branch>}"
          echo "TMS ref:      ${TMS_REF:-<default branch>}"
          echo "MQClient ref: ${MQCLIENT_REF:-<default branch>}"
          echo "Pilot ref:    ${PILOT_REF:-<default branch>}"

      - name: Build docs
        run: |
          set -euo pipefail
          sphinx-build -b html docs docs/_build/html

      - name: "Generate WMS schemas ReDoc page"
        run: |
          python -c "
          import json, pathlib
          spec = pathlib.Path('sources/wms/wms/schema/openapi.json').read_text()
          html = '''<!DOCTYPE html>
          <html>
            <head>
              <title>WMS API Schemas</title>
              <meta charset=\"utf-8\"/>
              <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
              <link href=\"https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700\" rel=\"stylesheet\">
              <style>body { margin: 0; padding: 0; }</style>
            </head>
            <body>
              <redoc spec-url=\"../wms-openapi.json\" required-props-first=\"true\" hide-hostname=\"true\"></redoc>
              <script src=\"https://cdn.jsdelivr.net/npm/redoc@2.1.5/bundles/redoc.standalone.js\"></script>
            </body>
          </html>'''
          out = pathlib.Path('docs/_build/html/apis')
          out.mkdir(parents=True, exist_ok=True)
          (out / 'wms-schemas.html').write_text(html)
          import shutil
          shutil.copy('sources/wms/wms/schema/openapi.json', 'docs/_build/html/wms-openapi.json')
          "

      - uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
