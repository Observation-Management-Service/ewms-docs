name: Build EWMS docs (cron or manual trigger)

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ewms-docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout here
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}  # lock to triggered commit (github.ref is dynamic)

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Checkout WMS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-workflow-management-service
          path: sources/wms

      - name: Checkout MQS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-message-queue-service
          path: sources/mqs

      - name: Checkout TMS
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/ewms-task-management-service
          path: sources/tms

      - name: Checkout MQClient
        uses: actions/checkout@v6
        with:
          repository: Observation-Management-Service/MQClient
          path: sources/mqclient

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          set -euo pipefail
          python -m pip install -r docs/requirements.txt

      - name: Build docs
        run: |
          set -euo pipefail
          sphinx-build -b html docs docs/_build/html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
